<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eve - Clinic Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ElevenLabs / Eve-agent theme */
            --white: #FFFFFF;
            --n50: #F2F2F2;
            --n100: #E5E5E5;
            --n200: #DCDCDC;
            --n300: #BDBDBD;
            --n400: #949494;
            --n500: #767676;
            --n600: #6E6E6E;
            --n700: #525252;
            --n800: #464646;
            --n900: #3D3D3D;
            --n950: #292929;
            --magenta: #B85A8A;
            --magenta-hover: #A04A78;
            --magenta-soft: #F8E8F2;
            --magenta-tint: #FCF2F8;
            --cream: var(--n50);
            --warm-white: var(--white);
            --border: var(--n200);
            --text: var(--n950);
            --text-muted: var(--n600);
            --accent: var(--magenta);
            --accent-hover: var(--magenta-hover);
            --accent-soft: var(--magenta-soft);
            --blush: var(--magenta-tint);
            --success: #059661;
            --card-shadow: 0 2px 8px rgba(41, 41, 41, 0.04);
            --card-shadow-hover: 0 4px 16px rgba(41, 41, 41, 0.08);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 20px;
            --radius-full: 999px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, Arial, sans-serif;
            font-size: 15px;
            font-weight: 400;
            background: var(--cream);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            letter-spacing: 0.01em;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(184, 90, 138, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(212, 144, 112, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Top nav */
        .topbar {
            position: relative;
            z-index: 10;
            background: var(--warm-white);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            min-height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-logo-img {
            height: 44px;
            width: auto;
            max-height: 48px;
            display: block;
            object-fit: contain;
        }

        .topbar-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
        }
        .topbar-title span { color: var(--accent); }

        .topbar-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .topbar-badge {
            font-size: 12px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: var(--radius-full);
            background: rgba(5, 150, 97, 0.12);
            color: var(--success);
        }

        .topbar-refresh {
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 18px;
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            background: var(--cream);
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s;
        }
        .topbar-refresh:hover {
            color: var(--accent);
            border-color: var(--accent-soft);
            background: var(--accent-soft);
        }

        /* Main layout */
        .dashboard {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px;
        }

        /* Stats row */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(252, 242, 248, 0.8) 0%, var(--warm-white) 40%, rgba(255, 247, 237, 0.5) 100%);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            box-shadow: var(--card-shadow);
            transition: box-shadow 0.25s ease;
        }
        .stat-card:hover { box-shadow: var(--card-shadow-hover); }

        .stat-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
        }

        .stat-detail {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 4px;
        }

        /* Call history section */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }

        .section-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Call cards */
        .call-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .call-card {
            background: linear-gradient(135deg, rgba(252, 242, 248, 0.6) 0%, rgba(255, 247, 237, 0.4) 100%);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            overflow: hidden;
            transition: all 0.2s;
            box-shadow: var(--card-shadow);
        }
        .call-card:hover {
            box-shadow: var(--card-shadow-hover);
        }

        .call-card-main {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
        }

        .call-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            flex-shrink: 0;
        }

        .call-info { flex: 1; }

        .call-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 3px;
            color: var(--text);
        }

        .call-meta {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
            display: flex;
            gap: 16px;
        }

        .call-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .call-tag {
            font-size: 11px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
        }
        .call-tag.appointment {
            background: var(--accent-soft);
            color: var(--accent);
        }
        .call-tag.completed {
            background: rgba(5, 150, 97, 0.12);
            color: var(--success);
        }
        .call-tag.active {
            background: rgba(232, 145, 58, 0.15);
            color: #E8913A;
        }

        .call-time {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
            text-align: right;
            flex-shrink: 0;
        }

        /* Expanded staff messages */
        .call-messages {
            display: none;
            padding: 0 24px 20px;
            border-top: 1px solid var(--border);
        }
        .call-messages.open { display: block; }

        .messages-title {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 16px 0 12px;
        }

        .staff-message {
            padding: 12px 16px;
            margin-bottom: 8px;
            background: var(--warm-white);
            border-left: 4px solid var(--accent);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 32px;
            background: linear-gradient(135deg, rgba(252, 242, 248, 0.6) 0%, rgba(255, 247, 237, 0.4) 100%);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .empty-text {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Webhook info */
        .webhook-banner {
            background: linear-gradient(135deg, rgba(252, 242, 248, 0.6) 0%, rgba(255, 247, 237, 0.4) 100%);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            padding: 16px 24px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--card-shadow);
        }

        .webhook-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
            animation: pulse 2s ease-in-out infinite;
        }

        .webhook-text {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
        }
        .webhook-text strong {
            font-weight: 600;
            color: var(--text);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .dashboard { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <img src="ElevenLabs%20Fertility%20Clinic%20Logo.png" alt="ElevenLabs Fertility Clinic" class="topbar-logo-img" />
    </div>
    <div class="topbar-right">
        <div class="topbar-badge">● System Active</div>
        <button class="topbar-refresh" onclick="loadDashboard()">↻ Refresh</button>
    </div>
</div>

<div class="dashboard">

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Total Calls</div>
            <div class="stat-value" id="stat-total">0</div>
            <div class="stat-detail">All time</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Appointments Scheduled</div>
            <div class="stat-value" id="stat-appointments">0</div>
            <div class="stat-detail">Via Eve</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Avg Call Duration</div>
            <div class="stat-value" id="stat-duration">0s</div>
            <div class="stat-detail">Across all calls</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Scheduling Rate</div>
            <div class="stat-value" id="stat-rate">0%</div>
            <div class="stat-detail">Calls with bookings</div>
        </div>
    </div>

    <!-- Call history -->
    <div class="section-header">
        <div>
            <div class="section-title">Recent Patient Calls</div>
            <div class="section-subtitle">Click a call to view the transcript</div>
        </div>
    </div>

    <div class="call-list" id="call-list">
        <!-- Populated by JS -->
    </div>
</div>

<script>
const expandedIndices = new Set();

function loadDashboard() {
    const raw = JSON.parse(localStorage.getItem('eve_call_history') || '[]');
    const hasContent = (c) => {
        const hasTranscript = c.transcript && c.transcript.length > 0;
        const hasAppointments = c.appointments_scheduled && c.appointments_scheduled.length > 0;
        const hasStaffMessages = c.staff_messages && c.staff_messages.length > 0;
        return hasTranscript || hasAppointments || hasStaffMessages;
    };
    const history = raw.filter(hasContent);
    /* Don't overwrite localStorage - eve-agent is source of truth; filtering is display-only */
    const callList = document.getElementById('call-list');

    // Preserve expanded state before rebuild
    callList.querySelectorAll('.call-messages.open').forEach(el => {
        const m = el.id && el.id.match(/^messages-(\d+)$/);
        if (m) expandedIndices.add(parseInt(m[1], 10));
    });

    // Stats
    const totalCalls = history.length;
    const totalAppointments = history.reduce((sum, c) => sum + (c.appointments_scheduled ? c.appointments_scheduled.length : 0), 0);
    const avgDuration = totalCalls > 0
        ? Math.round(history.reduce((sum, c) => sum + (c.duration_seconds || 0), 0) / totalCalls)
        : 0;
    const callsWithBookings = history.filter(c => c.appointments_scheduled && c.appointments_scheduled.length > 0).length;
    const schedulingRate = totalCalls > 0 ? Math.round((callsWithBookings / totalCalls) * 100) : 0;

    document.getElementById('stat-total').textContent = totalCalls;
    document.getElementById('stat-appointments').textContent = totalAppointments;
    document.getElementById('stat-duration').textContent = formatDuration(avgDuration);
    document.getElementById('stat-rate').textContent = schedulingRate + '%';

    // Call list
    if (history.length === 0) {
        callList.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">📞</div>
                <div class="empty-title">No calls yet</div>
                <div class="empty-text">When patients talk with Eve, their call data will appear here in real-time. Open the patient-facing page and start a conversation to see it in action.</div>
            </div>
        `;
        return;
    }

    callList.innerHTML = history.map((call, i) => {
        const initials = getInitials(call.patient_name || 'Unknown');
        const time = formatTime(call.start_time);
        const duration = formatDuration(call.duration_seconds || 0);
        const staffMessages = call.staff_messages || [];
        const appointments = call.appointments_scheduled || [];
        const transcript = call.transcript || [];

        const appointmentTags = appointments.map(a =>
            `<span class="call-tag appointment">${escapeHtml(a.type || a)}</span>`
        ).join('');

        const statusTag = call.status === 'completed'
            ? '<span class="call-tag completed">Completed</span>'
            : '<span class="call-tag active">Active</span>';

        const hasExpandable = staffMessages.length > 0 || transcript.length > 0;
        const messageIcon = staffMessages.length > 0 ? '✉️' : '';

        const staffMessagesHTML = staffMessages.length > 0 ? staffMessages.map(m => {
            const msgText = m.message !== undefined ? m.message : (m.text || m);
            return `<div class="staff-message">
                <div class="message-time">${formatTime(m.time)}</div>
                <div class="message-text">${escapeHtml(String(msgText))}</div>
            </div>`;
        }).join('') : '';

        const transcriptHTML = transcript.length > 0 ? transcript.map(t => {
            const txt = t.text !== undefined ? t.text : (t.message || t);
            const roleLabel = t.role === 'user' ? 'Patient' : 'Eve';
            return `<div class="staff-message transcript-msg">
                <div class="message-time">${formatTime(t.time)} · ${roleLabel}</div>
                <div class="message-text">${escapeHtml(String(txt))}</div>
            </div>`;
        }).join('') : '';

        const expandableSection = hasExpandable ? `
            <div class="call-messages" id="messages-${i}">
                ${transcript.length > 0 ? `
                <div class="messages-title">🗣️ Conversation (voice &amp; text)</div>
                ${transcriptHTML}
                ` : ''}
                ${staffMessages.length > 0 ? `
                <div class="messages-title">📋 Messages for Staff</div>
                ${staffMessagesHTML}
                ` : ''}
            </div>
        ` : '';

        return `
            <div class="call-card">
                <div class="call-card-main" ${hasExpandable ? `onclick="toggleMessages(${i})"` : ''}>
                    <div class="call-avatar">${initials}</div>
                    <div class="call-info">
                        <div class="call-name">${escapeHtml(call.patient_name || 'Unknown Patient')} ${messageIcon}</div>
                        <div class="call-meta">
                            <span>Duration: ${duration}</span>
                            <span>${appointments.length} appointment${appointments.length !== 1 ? 's' : ''} scheduled</span>
                            ${staffMessages.length > 0 ? `<span>${staffMessages.length} message${staffMessages.length !== 1 ? 's' : ''} for staff</span>` : ''}
                            ${transcript.length > 0 ? `<span>${transcript.length} in transcript</span>` : ''}
                        </div>
                    </div>
                    <div class="call-tags">
                        ${appointmentTags}
                        ${statusTag}
                    </div>
                    <div class="call-time">${time}</div>
                </div>
                ${expandableSection}
            </div>
        `;
    }).join('');

    // Restore expanded state after rebuild
    expandedIndices.forEach(idx => {
        const el = document.getElementById('messages-' + idx);
        if (el) el.classList.add('open');
    });
}

function toggleMessages(index) {
    const el = document.getElementById('messages-' + index);
    if (el) {
        el.classList.toggle('open');
        if (el.classList.contains('open')) {
            expandedIndices.add(index);
        } else {
            expandedIndices.delete(index);
        }
    }
}

function getInitials(name) {
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function formatDuration(seconds) {
    if (seconds < 60) return seconds + 's';
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return mins + 'm ' + secs + 's';
}

function formatTime(isoString) {
    if (!isoString) return '';
    const d = new Date(isoString);
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    if (isToday) return 'Today, ' + time;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ', ' + time;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Load on init
loadDashboard();

// Refresh when eve-agent signals an update (BroadcastChannel, same-origin)
try {
    const ch = new BroadcastChannel('eve-dashboard');
    ch.onmessage = () => loadDashboard();
} catch (_) {}

// Refresh when eve-agent updates localStorage (storage event, other tab)
window.addEventListener('storage', (e) => {
    if (e.key === 'eve_call_history' || e.key === 'eve_current_call') loadDashboard();
});

// Poll every 2 seconds as fallback
setInterval(loadDashboard, 2000);
</script>

</body>
</html>
